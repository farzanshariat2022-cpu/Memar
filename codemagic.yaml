workflows:
  architect-android:
    name: Architect - Android APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: تولید ساختار پروژه اندروید (چون این ریپو بدون android/ ارسال شده)
        script: |
          set -e
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.farzan .
          fi

      - name: جایگزینی فایل‌های gradle آماده‌شده با پشتیبانی Firebase
        script: |
          set -e
          cp -f ci/android_build.gradle android/build.gradle
          cp -f ci/android_app_build.gradle android/app/build.gradle

      - name: قرار دادن google-services.json (مستقیماً از ریپو، بدون وابستگی به Codemagic UI)
        script: |
          set -e

          if [ ! -f "firebase/google-services.json" ]; then
            echo "❌ خطا: فایل firebase/google-services.json در ریپو پیدا نشد."
            echo "   این فایل را از Firebase Console (Project settings -> your Android app)"
            echo "   دانلود کن و دقیقاً در مسیر firebase/google-services.json داخل ریپو قرار بده،"
            echo "   سپس دوباره پروژه را به Codemagic بده. راهنمای کامل در README.md."
            exit 1
          fi

          if grep -q "_COMMENT" "firebase/google-services.json"; then
            echo "❌ خطا: firebase/google-services.json هنوز همان فایل نمونه/الگو است، نه فایل واقعی."
            echo "   فایل واقعی را از Firebase Console دانلود کن و جایگزین همین مسیر کن."
            exit 1
          fi

          mkdir -p android/app
          cp -f firebase/google-services.json android/app/google-services.json

          # بررسی هم‌خوانی applicationId داخل گریدل با package_name داخل فایل فایربیس،
          # تا اگر یکی را عوض کردی و دیگری را فراموش کردی، بیلد همین‌جا با پیام واضح متوقف شود.
          GRADLE_APP_ID=$(grep -m1 'applicationId' android/app/build.gradle | sed -E 's/.*applicationId[[:space:]]+"([^"]+)".*/\1/')
          JSON_PACKAGE=$(grep -m1 'package_name' android/app/google-services.json | sed -E 's/.*"package_name":[[:space:]]*"([^"]+)".*/\1/')

          if [ "$GRADLE_APP_ID" != "$JSON_PACKAGE" ]; then
            echo "❌ خطا: عدم تطابق نام پکیج!"
            echo "   applicationId در ci/android_app_build.gradle: $GRADLE_APP_ID"
            echo "   package_name در firebase/google-services.json:  $JSON_PACKAGE"
            echo "   این دو باید کاملاً یکسان باشند. یا اپ اندرویدت را در Firebase Console"
            echo "   با پکیج $GRADLE_APP_ID دوباره ثبت کن و google-services.json را دوباره دانلود کن،"
            echo "   یا مقدار applicationId و namespace را در ci/android_app_build.gradle عوض کن."
            exit 1
          fi

          echo "✅ google-services.json با applicationId=$GRADLE_APP_ID با موفقیت جایگزین شد."

      - name: نصب پکیج‌ها
        script: flutter pub get

      - name: بیلد APK ریلیز
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients: []
